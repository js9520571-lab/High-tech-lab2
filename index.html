<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL INTERFACE | HUB</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff3366;
            --glass-bg: rgba(5, 10, 20, 0.85);
        }

        body { 
            margin: 0; 
            background: #000105; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; 
        }

        /* UI Overlay */
        .viewport-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        .system-status {
            color: var(--neon-blue);
            font-size: 0.8rem;
            letter-spacing: 5px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px var(--neon-blue);
            animation: pulse 2s infinite;
        }

        .catalog {
            display: flex;
            gap: 50px;
            pointer-events: auto;
        }

        .terminal-node {
            width: 300px;
            height: 180px;
            background: var(--glass-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 25px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            position: relative;
        }

        .terminal-node:hover {
            border-color: var(--neon-red);
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 51, 102, 0.2);
        }

        .terminal-node h2 { 
            margin: 0; 
            font-size: 1.2rem; 
            color: var(--neon-blue); 
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .terminal-node p { font-size: 0.85rem; color: #889; margin-top: 15px; line-height: 1.6; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="viewport-overlay">
        <div class="system-status">CORE_NEURAL_LINK: ACTIVE</div>
        
        <div class="catalog">
            <a href="https://cyber-hud-console--js9520571.replit.app" target="_blank" class="terminal-node">
                <h2>NODE_01: HUD</h2>
                <p>>_ Initialize heads-up display telemetry and system diagnostics protocol.</p>
            </a>

            <a href="https://js9520571-lab.github.io/q-engine-labs/" target="_blank" class="terminal-node">
                <h2>NODE_02: LABS</h2>
                <p>>_ Access experimental robotics and computer logic research environment.</p>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, servers = [], robots = [];
        
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000105);
            scene.fog = new THREE.FogExp2(0x000105, 0.003);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 20, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. Create Computer/Server Racks
            const towerGeo = new THREE.BoxGeometry(10, 60, 10);
            for (let i = 0; i < 100; i++) {
                const material = new THREE.MeshPhongMaterial({ color: 0x050505, shininess: 100 });
                const tower = new THREE.Mesh(towerGeo, material);
                
                // Add blinking LEDs to servers
                for(let j=0; j<5; j++) {
                    const led = new THREE.Mesh(
                        new THREE.PlaneGeometry(8, 0.5),
                        new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true })
                    );
                    led.position.set(0, (j * 10) - 20, 5.1);
                    tower.add(led);
                }

                tower.position.set((Math.random() - 0.5) * 600, 30, (Math.random() - 0.5) * 800);
                scene.add(tower);
                servers.push(tower);
            }

            // 2. Create Floating Robots (Drones)
            for (let i = 0; i < 30; i++) {
                const robotGroup = new THREE.Group();
                
                // Robot Body
                const body = new THREE.Mesh(
                    new THREE.SphereGeometry(2, 8, 8),
                    new THREE.MeshPhongMaterial({ color: 0x222, emissive: 0x00f2ff })
                );
                robotGroup.add(body);

                // Scanning Eye
                const eye = new THREE.Mesh(
                    new THREE.SphereGeometry(0.5, 8, 8),
                    new THREE.MeshBasicMaterial({ color: 0xff3366 })
                );
                eye.position.z = 1.8;
                robotGroup.add(eye);

                resetRobot(robotGroup);
                scene.add(robotGroup);
                robots.push(robotGroup);
            }

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
            const pLight = new THREE.PointLight(0x00f2ff, 1.5, 400);
            pLight.position.set(0, 50, 0);
            scene.add(pLight);

            animate();
        }

        function resetRobot(r) {
            r.position.set((Math.random() - 0.5) * 400, 20 + Math.random() * 40, -400);
            r.userData.speed = 1 + Math.random() * 2;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Move Camera through the data center
            camera.position.z -= 0.3;
            if(camera.position.z < -200) camera.position.z = 150;

            // Animate Robots
            robots.forEach(r => {
                r.position.z += r.userData.speed;
                r.position.y += Math.sin(time + r.position.x) * 0.1; // Floating bob
                if (r.position.z > 200) resetRobot(r);
            });

            // Animate Server LEDs (Blinking)
            servers.forEach(s => {
                s.children.forEach(led => {
                    if(Math.random() > 0.98) led.visible = !led.visible;
                });
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
