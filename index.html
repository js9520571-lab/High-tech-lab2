<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-ENGINE | NEURAL INTERFACE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); }

        /* Catalog UI */
        .interface {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            display: flex; gap: 30px;
            pointer-events: none;
        }

        .card {
            width: 300px; height: 180px;
            background: rgba(0, 8, 15, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.3);
            backdrop-filter: blur(15px);
            border-radius: 4px;
            padding: 25px;
            color: white;
            text-decoration: none;
            pointer-events: auto;
            transition: 0.4s ease;
            display: flex; flex-direction: column; justify-content: center;
        }

        .card:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: #00f2ff;
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .card h2 { margin: 0; font-size: 1.5rem; letter-spacing: 3px; color: #00f2ff; }
        .card p { color: #8b949e; font-size: 0.85rem; margin-top: 10px; line-height: 1.5; }

        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="interface">
        <a href="https://cyber-hud-console--js9520571.replit.app" target="_blank" class="card">
            <h2>CYBER HUD</h2>
            <p>Initialize real-time diagnostic interface and neural uplink.</p>
        </a>
        <a href="https://js9520571-lab.github.io/q-engine-labs/" target="_blank" class="card">
            <h2>Q-LABS</h2>
            <p>Access experimental physics engine and core laboratory files.</p>
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, cityGroup, cars = [];
        const CITY_SIZE = 1000;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000205);
            scene.fog = new THREE.FogExp2(0x000205, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 40, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            cityGroup = new THREE.Group();
            scene.add(cityGroup);

            // Create Realistic Buildings
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 400; i++) {
                const h = 20 + Math.random() * 150;
                const w = 15 + Math.random() * 15;
                
                // Dark glass material with "emissive" windows
                const material = new THREE.MeshStandardMaterial({
                    color: 0x050505,
                    roughness: 0.1,
                    metalness: 0.9,
                    emissive: Math.random() > 0.6 ? 0x00f2ff : 0x000000,
                    emissiveIntensity: 0.5
                });

                const building = new THREE.Mesh(boxGeo, material);
                building.scale.set(w, h, w);
                building.position.set(
                    (Math.random() - 0.5) * 800,
                    h / 2,
                    (Math.random() - 0.5) * 1000 - 300
                );
                cityGroup.add(building);
            }

            // Flying Car Light Trails
            for (let i = 0; i < 100; i++) {
                createCar();
            }

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(ambient);
            
            const bluePoint = new THREE.PointLight(0x00f2ff, 2, 500);
            bluePoint.position.set(0, 100, -100);
            scene.add(bluePoint);

            animate();
        }

        function createCar() {
            const isBlue = Math.random() > 0.3;
            const color = isBlue ? 0x00f2ff : 0x7000ff;
            const length = 10 + Math.random() * 20;
            
            const geo = new THREE.BoxGeometry(0.5, 0.5, length);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            const car = new THREE.Mesh(geo, mat);
            
            resetCar(car);
            scene.add(car);
            cars.push(car);
        }

        function resetCar(car) {
            car.position.x = (Math.random() - 0.5) * 600;
            car.position.y = 20 + Math.random() * 100;
            car.position.z = -600;
            car.userData.speed = 2 + Math.random() * 6;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Move camera forward through the city
            camera.position.z -= 0.5;
            if (camera.position.z < -400) camera.position.z = 100;

            // Move cars
            cars.forEach(car => {
                car.position.z += car.userData.speed;
                if (car.position.z > 200) resetCar(car);
            });

            // Gentle camera tilt
            camera.rotation.y = Math.sin(Date.now() * 0.0002) * 0.05;
            camera.rotation.z = Math.cos(Date.now() * 0.0002) * 0.02;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
