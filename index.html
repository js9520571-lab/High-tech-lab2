<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital System Portal</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --panel-bg: rgba(0, 5, 12, 0.8);
        }

        body { 
            margin: 0; 
            background: #000205; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* The Catalog UI */
        .overlay-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
            pointer-events: none;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.7) 100%);
        }

        .hub-title {
            color: white;
            letter-spacing: 15px;
            text-transform: uppercase;
            font-weight: 200;
            margin-bottom: 50px;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .catalog {
            display: flex;
            gap: 40px;
            pointer-events: auto;
        }

        .node-link {
            width: 300px;
            height: 180px;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 2px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .node-link:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .node-link h2 { 
            margin: 0; 
            font-size: 1.4rem; 
            letter-spacing: 2px; 
            color: var(--neon-blue);
        }

        .node-link p { 
            color: #8b949e; 
            font-size: 0.9rem; 
            margin-top: 15px; 
            line-height: 1.4;
        }

        /* Scanline Texture Overlay */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>

    <div class="overlay-container">
        <h1 class="hub-title">System Interface</h1>
        
        <div class="catalog">
            <a href="https://cyber-hud-console--js9520571.replit.app" target="_blank" class="node-link">
                <h2>TERMINAL 01</h2>
                <p>Access Cyber HUD Console diagnostics and visual telemetry systems.</p>
            </a>

            <a href="https://js9520571-lab.github.io/q-engine-labs/" target="_blank" class="node-link">
                <h2>TERMINAL 02</h2>
                <p>Initialize Lab Environment. Primary research and development core.</p>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, cityGroup;
        let traffic = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000205);
            scene.fog = new THREE.FogExp2(0x000205, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 50, 200);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            cityGroup = new THREE.Group();
            scene.add(cityGroup);

            // Generate "Realistic" High-Rise Blocks
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 350; i++) {
                const h = 20 + Math.random() * 150;
                const w = 15 + Math.random() * 20;
                
                // Building Material (Deep dark with subtle window glow)
                const material = new THREE.MeshPhongMaterial({
                    color: 0x0a0a0a,
                    emissive: 0x00f2ff,
                    emissiveIntensity: Math.random() > 0.8 ? 0.4 : 0,
                    shininess: 100
                });

                const building = new THREE.Mesh(geometry, material);
                building.scale.set(w, h, w);
                building.position.set(
                    (Math.random() - 0.5) * 800,
                    h / 2,
                    (Math.random() - 0.5) * 1200 - 400
                );
                cityGroup.add(building);
            }

            // Flying Traffic (Light Streaks)
            for (let i = 0; i < 80; i++) {
                const trailGeo = new THREE.BoxGeometry(0.5, 0.2, 15 + Math.random() * 20);
                const trailMat = new THREE.MeshBasicMaterial({ 
                    color: Math.random() > 0.5 ? 0x00f2ff : 0x7000ff,
                    transparent: true,
                    opacity: 0.8
                });
                const car = new THREE.Mesh(trailGeo, trailMat);
                resetCar(car);
                scene.add(car);
                traffic.push(car);
            }

            // Lighting
            const light = new THREE.PointLight(0x00f2ff, 1.5, 600);
            light.position.set(0, 100, 0);
            scene.add(light);

            animate();
        }

        function resetCar(car) {
            car.position.x = (Math.random() - 0.5) * 600;
            car.position.y = 30 + Math.random() * 100;
            car.position.z = -600;
            car.userData.speed = 3 + Math.random() * 5;
        }

        function animate() {
            requestAnimationFrame(animate);

            // Move the city to create a "Fly-over" effect
            cityGroup.position.z += 0.5;
            if (cityGroup.position.z > 500) cityGroup.position.z = 0;

            // Move Traffic
            traffic.forEach(car => {
                car.position.z += car.userData.speed;
                if (car.position.z > 300) resetCar(car);
            });

            // Camera Motion
            camera.position.x = Math.sin(Date.now() * 0.0005) * 20;
            camera.lookAt(0, 30, -100);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
