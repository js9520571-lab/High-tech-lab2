<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Engine | 3D Command Center</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }

        /* Catalog Overlay */
        .ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 40px;
            z-index: 100;
        }

        .card {
            width: 280px;
            height: 180px;
            background: rgba(13, 17, 23, 0.7);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(15px);
            color: white;
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.1);
            border-color: #58a6ff;
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.4);
            background: rgba(13, 17, 23, 0.9);
        }

        .card h2 { margin: 0; font-size: 1.4rem; letter-spacing: 2px; color: #58a6ff; }
        .card p { color: #8b949e; font-size: 0.9rem; margin-top: 10px; }

        .overlay-vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="overlay-vignette"></div>

    <div class="ui-layer">
        <a href="https://cyber-hud-console--js9520571.replit.app" target="_blank" class="card">
            <h2>CYBER HUD</h2>
            <p>Node 01: Interactive Console</p>
        </a>
        <a href="https://js9520571-lab.github.io/q-engine-labs/" target="_blank" class="card">
            <h2>LABS ENGINE</h2>
            <p>Node 02: Research Environment</p>
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, cityGroup, cars = [];

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.002);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 40, 100);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            cityGroup = new THREE.Group();
            scene.add(cityGroup);

            // 1. Create Buildings
            const buildGeo = new THREE.BoxGeometry(1, 1, 1);
            for(let i=0; i<200; i++) {
                const material = new THREE.MeshPhongMaterial({
                    color: 0x111111,
                    emissive: 0x58a6ff,
                    emissiveIntensity: Math.random() > 0.8 ? 0.5 : 0 // Random windows
                });
                
                const b = new THREE.Mesh(buildGeo, material);
                b.position.x = Math.random() * 400 - 200;
                b.position.z = Math.random() * 400 - 400;
                b.scale.x = 10 + Math.random() * 10;
                b.scale.y = 20 + Math.random() * 100;
                b.scale.z = 10 + Math.random() * 10;
                b.position.y = b.scale.y / 2;
                cityGroup.add(b);
            }

            // 2. Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);
            
            const blueLight = new THREE.PointLight(0x58a6ff, 2, 200);
            blueLight.position.set(0, 50, -50);
            scene.add(blueLight);

            // 3. Create Flying Cars (as light trails)
            for(let i=0; i<60; i++) {
                createCar();
            }

            animate();
        }

        function createCar() {
            const carGeo = new THREE.BoxGeometry(0.5, 0.2, 4);
            const carMat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0x58a6ff : 0xbc8cff });
            const car = new THREE.Mesh(carGeo, carMat);
            
            resetCar(car);
            scene.add(car);
            cars.push(car);
        }

        function resetCar(car) {
            car.position.x = Math.random() * 400 - 200;
            car.position.y = 20 + Math.random() * 60;
            car.position.z = -400;
            car.userData.speed = 1 + Math.random() * 3;
        }

        function animate() {
            requestAnimationFrame(animate);

            // Move the city slowly toward the camera for a "flying" feel
            cityGroup.position.z += 0.5;
            if(cityGroup.position.z > 200) cityGroup.position.z = 0;

            // Animate Cars
            cars.forEach(car => {
                car.position.z += car.userData.speed;
                if(car.position.z > 100) resetCar(car);
                
                // Make cars flicker slightly
                car.material.opacity = 0.5 + Math.random() * 0.5;
            });

            // Gentle camera sway
            camera.position.x = Math.sin(Date.now() * 0.0005) * 10;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
