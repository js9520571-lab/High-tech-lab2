<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Tech Float</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; /* GitHub Dark Dimmed background */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #c9d1d9;
            pointer-events: none; /* Allows clicking through to the canvas if needed */
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content">
        <h1>Digital Ecosystem</h1>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const techIcons = ['{ }', '</>', '10', '01', '◈', 'λ', 'git', '∫', '[]'];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            
            // Create 100 tech objects
            for (let i = 0; i < 100; i++) {
                particles.push(new TechObject());
            }
        }

        class TechObject {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 15 + 10;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.text = techIcons[Math.floor(Math.random() * techIcons.length)];
                this.opacity = Math.random() * 0.5 + 0.1;
                // Parallax depth effect
                this.depth = Math.random() * 3 + 1; 
            }

            update() {
                this.x += this.speedX / this.depth;
                this.y += this.speedY / this.depth;

                // Wrap around screen
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.font = `${this.size}px monospace`;
                ctx.fillStyle = `rgba(139, 148, 158, ${this.opacity})`;
                ctx.fillText(this.text, this.x, this.y);
                
                // Subtle glow for larger "closer" objects
                if (this.depth < 1.5) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#58a6ff";
                } else {
                    ctx.shadowBlur = 0;
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);

        init();
        animate();
    </script>
</body>
</html>
