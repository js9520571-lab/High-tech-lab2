<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Interface Portal</title>
    <style>
        body { margin: 0; background: #000205; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { display: block; }

        /* UI Overlay mirroring the generated image */
        .interface-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
        }

        .portal-container {
            background: rgba(0, 10, 20, 0.4);
            border: 1px solid rgba(0, 242, 255, 0.4);
            backdrop-filter: blur(25px);
            border-radius: 12px;
            padding: 40px;
            display: flex; gap: 30px;
            pointer-events: auto;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        .card {
            width: 260px; height: 160px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            color: white;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .card:hover {
            background: rgba(0, 242, 255, 0.08);
            border-color: #00f2ff;
            transform: translateY(-5px);
        }

        .card h2 { margin: 0; font-size: 1.2rem; color: #00f2ff; letter-spacing: 2px; }
        .card p { font-size: 0.8rem; color: #8b949e; line-height: 1.6; }

        .footer-text {
            margin-top: 20px;
            color: white;
            letter-spacing: 5px;
            font-size: 0.7rem;
            opacity: 0.7;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="interface-layer">
        <div class="portal-container">
            <a href="https://cyber-hud-console--js9520571.replit.app" target="_blank" class="card">
                <h2>CYBER HUD</h2>
                <p>Telemetry status: ACTIVE. Interface diagnostics initialized.</p>
            </a>
            <a href="https://js9520571-lab.github.io/q-engine-labs/" target="_blank" class="card">
                <h2>LABS PORTAL</h2>
                <p>Research protocol authorized. Accessing core data nodes.</p>
            </a>
        </div>
        <div class="footer-text">Neural Interface Portal</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, particles;
        const PARTICLE_COUNT = 4000;
        let mouseX = 0, mouseY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 150;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Create the "Neural Wave" 3D Geometry
            const geometry = new THREE.BufferGeometry();
            const pos = [];
            const colors = [];
            const color1 = new THREE.Color(0x00f2ff); // Cyan
            const color2 = new THREE.Color(0x7000ff); // Purple

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // Creating a wave-like field
                pos.push((Math.random() - 0.5) * 600); // X
                pos.push((Math.random() - 0.5) * 400); // Y
                pos.push((Math.random() - 0.5) * 300); // Z

                const mixedColor = color1.clone().lerp(color2, Math.random());
                colors.push(mixedColor.r, mixedColor.g, mixedColor.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 1.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending // This creates the "Glow" look
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.0005;
            
            // Slow rotation for background feel
            particles.rotation.y = time * 0.1;
            particles.rotation.x = time * 0.05;

            // Interactive movement based on mouse
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) / 10;
            mouseY = (e.clientY - window.innerHeight / 2) / 10;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
