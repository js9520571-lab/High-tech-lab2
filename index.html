<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Interface Portal</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --glass: rgba(0, 10, 20, 0.7);
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            filter: blur(2px); /* Creates the soft glow effect */
        }

        /* The Catalog UI */
        .portal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
            pointer-events: none; /* Let clicks pass to the background if needed */
        }

        .portal-header {
            color: white;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 60px;
            font-weight: 200;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .catalog-nodes {
            display: flex; gap: 40px;
            pointer-events: auto; /* Re-enable clicks for the cards */
        }

        .node-card {
            width: 320px; height: 200px;
            background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 4px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative; overflow: hidden;
        }

        .node-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        .node-card h2 { 
            margin: 0; font-size: 1.5rem; letter-spacing: 3px; 
            background: linear-gradient(90deg, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .node-card p { 
            font-size: 0.9rem; color: #8b949e; margin-top: 15px; 
            line-height: 1.5; font-weight: 300;
        }

        /* Vignette for depth */
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 5; pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="vignette"></div>

    <div class="portal-overlay">
        <h1 class="portal-header">Neural Flow</h1>
        
        <div class="catalog-nodes">
            <a href="https://cyber-hud-console--js9520571.replit.app" target="_blank" class="node-card">
                <h2>Cyber HUD</h2>
                <p>Initialize real-time telemetry and interface diagnostics stream.</p>
            </a>

            <a href="https://js9520571-lab.github.io/q-engine-labs/" target="_blank" class="node-card">
                <h2>Q-Labs</h2>
                <p>Access experimental research and core development protocols.</p>
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        const MAX_POINTS = 100; // Increase for higher density, decrease for performance
        const CONNECT_DISTANCE = 150; // Distance to draw connections
        const SPEED = 0.5;

        // Colors referencing the blue/purple glow of the image
        const colors = ['#00f2ff', '#bc8cff', '#0070ff', '#8b949e'];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            points = [];
            for (let i = 0; i < MAX_POINTS; i++) {
                points.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * SPEED,
                    vy: (Math.random() - 0.5) * SPEED,
                    size: Math.random() * 2 + 1,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw connections FIRST
            ctx.lineWidth = 0.3;
            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const dx = points[i].x - points[j].x;
                    const dy = points[i].y - points[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < CONNECT_DISTANCE) {
                        // Create gradient connection (blue to purple)
                        const grad = ctx.createLinearGradient(points[i].x, points[i].y, points[j].x, points[j].y);
                        grad.addColorStop(0, points[i].color);
                        grad.addColorStop(1, points[j].color);
                        
                        ctx.strokeStyle = grad;
                        ctx.globalAlpha = 1 - (dist / CONNECT_DISTANCE); // Fade based on distance
                        ctx.beginPath();
                        ctx.moveTo(points[i].x, points[i].y);
                        ctx.lineTo(points[j].x, points[j].y);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }

            // Draw Points SECOND
            points.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                // Simple Movement
                p.x += p.vx;
                p.y += p.vy;

                // Screen Wrap
                if (p.x > canvas.width) p.x = 0;
                if (p.x < 0) p.x = canvas.width;
                if (p.y > canvas.height) p.y = 0;
                if (p.y < 0) p.y = canvas.height;
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
